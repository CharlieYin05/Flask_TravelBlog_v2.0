{% extends "base.html" %}

{% block title %}Search - Travel App{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
{% endblock %}

{% block content %}

<section 
  class="relative flex items-start justify-center pt-32 pb-32 min-h-[75vh]"
  style="
    background-image: url('https://loremflickr.com/1920/1080/city,world,travel');
    background-size: cover;
    background-position: center;
  "
>

    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-black opacity-40"></div>

    <!-- Smooth fade into next section -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/10 to-gray-50"></div>

    <!-- Content -->
    <div class="w-full max-w-2xl px-6 relative z-10">
      
      <h1 class="text-3xl md:text-4xl font-bold text-center mb-6 text-white">
        Find your next adventure
      </h1>

      <div class="relative">
        <input 
          type="text" 
          id="search-input"
          placeholder="Search itineraries..."
          class="w-full px-6 py-4 text-lg rounded-2xl border-2 border-white shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/95"
        />

        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-600">
          🔍
        </div>
      </div>

      <div class="mt-4 flex justify-center">
        <div class="inline-flex flex-col items-stretch gap-3">
          <div class="inline-flex justify-center gap-2">
            <button
              id="toggle-title"
              class="search-toggle rounded-full bg-white px-5 py-2 text-sm font-semibold text-indigo-600 shadow transition"
              data-type="title"
            >
              By Title
            </button>
            <button
              id="toggle-country"
              class="search-toggle rounded-full bg-white/30 px-5 py-2 text-sm font-semibold text-white shadow transition backdrop-blur-sm"
              data-type="country"
            >
              By Country
            </button>
          </div>

          <div class="relative w-full">
            <select id="sort-select" class="sr-only" aria-label="Sort search results">
              <option value="default">Sort: Default</option>
              <option value="likes">Sort: Most Liked</option>
              <option value="recent">Sort: Most Recent</option>
            </select>

            <div id="sort-dropdown" class="relative">
              <button
                id="sort-trigger"
                type="button"
                aria-expanded="false"
                class="flex w-full items-center justify-between rounded-full border-2 border-white/75 bg-white/15 px-4 py-2.5 text-left text-sm font-semibold text-white shadow-lg backdrop-blur-md transition hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/60"
              >
                <span id="sort-label">Sort: Default</span>
                <svg
                  id="sort-chevron"
                  class="h-3.5 w-3.5 shrink-0 transition-transform"
                  viewBox="0 0 16 16"
                  fill="currentColor"
                  aria-hidden="true"
                >
                  <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"></path>
                </svg>
              </button>

              <div
                id="sort-menu"
                class="absolute left-0 right-0 top-[calc(100%+0.4rem)] hidden overflow-hidden rounded-[1.5rem] border border-white/60 bg-white/95 shadow-2xl backdrop-blur-md"
              >
                <button
                  type="button"
                  data-value="default"
                  class="sort-option w-full bg-slate-400 px-4 py-3 text-left text-sm font-semibold text-white transition hover:bg-slate-500"
                >
                  Sort: Default
                </button>
                <button
                  type="button"
                  data-value="likes"
                  class="sort-option w-full px-4 py-3 text-left text-sm font-semibold text-slate-900 transition hover:bg-indigo-50"
                >
                  Sort: Most Liked
                </button>
                <button
                  type="button"
                  data-value="recent"
                  class="sort-option w-full px-4 py-3 text-left text-sm font-semibold text-slate-900 transition hover:bg-indigo-50"
                >
                  Sort: Most Recent
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

</section>

<section class="bg-gray-50 py-16">
  <div class="w-full max-w-6xl mx-auto px-6">
    <div id="search-results">
      <!-- Results will be displayed here -->
    </div>
  </div>
</section>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}

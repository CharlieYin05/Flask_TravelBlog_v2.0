{% extends "base.html" %}

{% block title %}Search - Travel App{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
{% endblock %}

{% block content %}

<section 
  class="relative flex items-start justify-center pt-32 pb-32 min-h-[75vh]"
  style="
    background-image: url('https://loremflickr.com/1920/1080/city,world,travel');
    background-size: cover;
    background-position: center;
  "
>

    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-black opacity-40"></div>

    <!-- Smooth fade into next section -->
    <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/10 to-gray-50"></div>

    <!-- Content -->
    <div class="w-full max-w-2xl px-6 relative z-10">
      
      <h1 class="text-3xl md:text-4xl font-bold text-center mb-6 text-white">
        Find your next adventure
      </h1>

      <div class="relative">
        <input 
          type="text" 
          id="search-input"
          placeholder="Search itineraries..."
          class="w-full px-6 py-4 text-lg rounded-2xl border-2 border-white shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white/95"
        />

        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-600">
          🔍
        </div>
      </div>

      <!-- Search type toggle -->
      <div class="flex justify-center mt-4 gap-2">
        <button
          id="toggle-title"
          class="search-toggle px-5 py-2 rounded-full text-sm font-semibold bg-white text-indigo-600 shadow transition"
          data-type="title"
        >
          By Title
        </button>
        <button
          id="toggle-country"
          class="search-toggle px-5 py-2 rounded-full text-sm font-semibold bg-white/30 text-white shadow transition"
          data-type="country"
        >
          By Country
        </button>
      </div>

    </div>

</section>

<section class="bg-gray-50 py-16">
  <div class="w-full max-w-6xl mx-auto px-6">
    <div id="search-results">
      <!-- Results will be displayed here -->
    </div>
  </div>
</section>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Browse Itineraries{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/browse-itinerary.css') }}">
{% endblock %}

{% block content %}

<section class="max-w-6xl mx-auto px-4 pt-28 pb-6">
  <h1 class="text-3xl font-bold mb-2">Explore Travel Plans</h1>
  <p class="text-gray-500">Find inspiration for your next trip ✈️</p>
</section>

<main class="max-w-6xl mx-auto px-4 pb-10">

  <div class="grid md:grid-cols-3 gap-6">

    {% for it in itineraries %}

    <a href="{{ url_for('main.view_itinerary', id=it.id) }}">

      <div class="bg-white rounded-2xl shadow hover:shadow-lg transition overflow-hidden">

        <!-- image -->
        <img src="{{ it.cover_image_url }}" 
             class="w-full h-48 object-cover">

        <!-- content -->
        <div class="p-4 space-y-2">
          <h3 class="text-lg font-semibold">{{ it.title }}</h3>
          <p class="text-gray-500 text-sm">{{ it.country }}</p>
        </div>

      </div>

    </a>

    {% endfor %}

  </div>

</main>

{% endblock %}

{% extends "base.html" %}
{% block title %}View Itinerary{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/view-itinerary.css') }}">
{% endblock %}


{% block content %}
<!-- HERO / HEADER -->
<section class="max-w-6xl mx-auto px-4 pt-28 pb-8">
    <div class="overflow-hidden rounded-3xl shadow-lg bg-white border border-slate-200">
        <img id="cover-photo" class="w-full h-[260px] md:h-[380px] object-cover" alt="Itinerary cover photo">
        <div class="p-6 md:p-8 space-y-4">
            <div class="flex flex-wrap items-start justify-between gap-4">
                <div class="space-y-3 max-w-3xl">
                    <div
                        class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-50 text-blue-700 text-sm font-medium">
                        <span>📍</span>
                        <span id="country"></span>
                    </div>
                    <h2 id="title" class="text-3xl md:text-4xl font-bold tracking-tight"></h2>
                    <div class="text-sm md:text-base text-slate-500 flex flex-wrap gap-x-3 gap-y-1">
                        <span><strong class="text-slate-700">Author:</strong> <span id="author"></span></span>
                        <span>•</span>
                        <span><strong class="text-slate-700">Created:</strong> <span id="date"></span></span>
                    </div>
                </div>
                <div class="flex flex-wrap gap-2 justify-start md:justify-end" id="tags"></div>
            </div>

            <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200">
                <h3 class="text-lg font-semibold mb-2">Overview</h3>
                <p id="overview" class="text-slate-600 leading-7"></p>
            </div>
        </div>
    </div>
</section>

<!-- MAIN -->
<main class="max-w-7xl mx-auto px-4 pb-16">
    <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_380px] gap-8 items-start">
        <section>
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-2xl font-bold">Daily Timeline</h2>
                <div id="current-indicator"
                    class="inline-flex items-center gap-2 bg-white px-4 py-2 shadow-sm rounded-full border border-slate-200 text-sm text-slate-600">
                    <span>Now viewing:</span>
                    <span id="current-label" class="font-semibold text-slate-800">Day 1 - Activity 1</span>
                </div>
            </div>

            <div id="timeline" class="space-y-10"></div>
        </section>

        <aside class="lg:sticky lg:top-28 space-y-4">
            <div class="bg-white border border-slate-200 rounded-3xl p-4 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-xl font-bold">Google Map</h2>
                    <div class="text-xs text-slate-500 flex flex-wrap gap-3">
                        <span>🟢 Activity</span>
                        <span>🔵 Stay</span>
                        <span>🔴 Food</span>
                    </div>
                </div>
                <div id="map" class="h-[520px] rounded-2xl overflow-hidden bg-slate-200"></div>
            </div>
        </aside>
    </div>
</main>

<!-- INTERACTION -->
<section class="max-w-6xl mx-auto px-4 pb-16">
    <div class="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm space-y-4">
        <div class="flex flex-wrap gap-4">
            <button id="like-btn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition">👍
                Like</button>
            <button id="fav-btn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl transition">⭐
                Favorite</button>
        </div>

        <div class="flex flex-col md:flex-row gap-3">
            <textarea id="comment-box" class="w-full border border-slate-200 p-3 rounded-2xl min-h-[100px] resize-y"
                placeholder="Leave a comment..."></textarea>
            <button id="comment-btn"
                class="px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl self-start transition">
                Post
            </button>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/view-itinerary.js') }}"></script>

<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFbTlfB_BZlezD2-l2HPvU5mvtKQopBUM&callback=onGoogleMapsReady">
</script>
{% endblock %}

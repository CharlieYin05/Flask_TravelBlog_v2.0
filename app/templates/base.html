<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Travel App{% endblock %}</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Page-specific CSS -->
  {% block extra_css %}{% endblock %}
</head>

<body class="bg-gray-50 text-gray-900">

  <!-- Navigation Bar -->
  <nav class="bg-white/70 backdrop-blur-md border-b border-white/60 shadow-sm text-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">

        <!-- Logo -->
        <span class="text-xl font-bold tracking-tight">
          <a href="{{ url_for('main.index') }}" class="text-slate-900 hover:text-blue-600 transition-colors">
            Travel Blog
          </a>
        </span>

        <!-- Nav Links -->
        <div class="hidden md:flex items-center space-x-8 font-medium">
          {% if session.get('user') %}
          <a href="{{ url_for('main.submit_itinerary') }}"
            class="text-slate-700 hover:text-blue-600 transition-colors">Post</a>
          {% else %}
          <a href="{{ url_for('main.signin') }}" class="text-slate-700 hover:text-blue-600 transition-colors">Post</a>
          {% endif %}

          <a href="{{ url_for('main.search') }}" class="text-slate-700 hover:text-blue-600 transition-colors">Search</a>

          <a href="{{ url_for('main.browse') }}" class="text-slate-700 hover:text-blue-600 transition-colors">
            Browse
          </a>
        </div>

        <!-- Auth / Profile -->
        <div class="flex items-center space-x-4">
          {% if session.get('user') %}
          <div class="flex items-center space-x-4">
            <a href="{{ url_for('main.portfolio') }}"
              class="text-sm text-slate-600 hover:text-blue-600 transition-colors">
              {{ session.get('user') }}
            </a>

            <form method="POST" action="{{ url_for('main.logout') }}">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button type="submit"
                class="bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm transition-all">
                Sign out
              </button>
            </form>
          </div>
          {% else %}
          <div class="flex items-center space-x-4">
            <a href="{{ url_for('main.signin') }}" class="text-slate-600 hover:text-blue-600 transition-colors">
              Sign in
            </a>

            <a href="{{ url_for('main.signup') }}"
              class="bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm transition-all">
              Sign up
            </a>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Page-specific JS -->
  {% block extra_js %}{% endblock %}

</body>

</html>
